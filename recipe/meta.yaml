{% set name = "pytest-golden" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: bfc9ce41f4dd9527d30f5e6db30b6d5c9f5f7360e2c11fb7b603376ef9535e32

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry >=0.12
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0.0
    - pytest >=6.1.2
    - ruamel.yaml >=0.16.12,<1.0
    - atomicwrites >=1.4.0,<2.0.0
    - dataclasses >=0.7,<1.0
    - testfixtures >=6.15.0,<7.0.0

test:
  imports:
    - pytest_golden
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/oprypin/pytest-golden
  summary: Plugin for pytest that offloads expected outputs to data files
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - fpaniagua
