# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: pytest-golden
  version: "0.2.2"
  python_min: '3.9'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pytest-golden-${{ version }}.tar.gz
  sha256: 54e6f317a533758e6dcc96e6ef9457c610ae1c9db53575686a303f3ef7ad1e35

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry >=0.12
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - pytest >=6.1.2
    - ruamel.yaml >=0.16.12,<1.0
    - atomicwrites >=1.4.0,<2.0.0
    - dataclasses >=0.7,<1.0
    - testfixtures >=6.15.0,<7.0.0

tests:
  - python:
      imports:
        - pytest_golden
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: Plugin for pytest that offloads expected outputs to data files
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/oprypin/pytest-golden

extra:
  recipe-maintainers:
    - fpaniagua
